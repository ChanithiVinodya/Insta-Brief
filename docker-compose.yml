services:
  postgres:
    image: postgres:16-alpine
    container_name: instabrief-postgres
    environment:
      POSTGRES_DB: instabrief
      POSTGRES_USER: instabrief
      POSTGRES_PASSWORD: instabrief_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U instabrief -d instabrief"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - instabrief-net

  ai-service:
    build: ./ai-service
    container_name: instabrief-ai-service
    env_file:
      - ./ai-service/.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/instabrief
      SPRING_DATASOURCE_USERNAME: instabrief
      SPRING_DATASOURCE_PASSWORD: instabrief_secret
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - instabrief-net

  nlp-service:
    build: ./nlp-service
    container_name: instabrief-nlp-service
    ports:
      - "3005:3005"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3005/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - instabrief-net

  api-gateway:
    build: ./api-gateway
    container_name: instabrief-api-gateway
    env_file:
      - ./api-gateway/.env
    environment:
      DATABASE_URL: postgresql://instabrief:instabrief_secret@postgres:5432/instabrief
      PORT: 3000
      CORS_ORIGIN: http://localhost:5174
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - instabrief-net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:3000
    container_name: instabrief-frontend
    ports:
      - "5174:80"
    depends_on:
      - api-gateway
    networks:
      - instabrief-net

volumes:
  pgdata:

networks:
  instabrief-net:
    driver: bridge
