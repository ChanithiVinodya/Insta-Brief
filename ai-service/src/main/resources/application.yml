spring:
  application:
    name: instabrief-ai-service
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

instabrief:
  news-api-key: ${NEWS_API_KEY}
  news-api-url: ${NEWS_API_URL:https://newsapi.org/v2/top-headlines}
  news-api-country: ${NEWS_API_COUNTRY:us}
  news-api-page-size: ${NEWS_API_PAGE_SIZE:20}
  rss-feed-urls: ${RSS_FEED_URLS:}
  hf-api-token: ${HF_API_TOKEN}
  hf-summary-model: ${HF_SUMMARY_MODEL:facebook/bart-large-cnn}
  hf-api-url: ${HF_API_URL:https://api-inference.huggingface.co/models}
  ingestion-enabled: ${INGESTION_ENABLED:true}
  ingestion-fixed-delay-ms: ${INGESTION_FIXED_DELAY_MS:1800000}
  trending-fixed-delay-ms: ${TRENDING_FIXED_DELAY_MS:900000}
  max-keywords: ${MAX_KEYWORDS:8}
  summary-max-length: ${SUMMARY_MAX_LENGTH:1024}
