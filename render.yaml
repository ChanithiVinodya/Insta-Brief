services:
  # NLP Service
  - type: web
    name: instabrief-nlp-service
    env: node
    rootDir: nlp-service
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: PORT
        value: 3005

  # AI Service
  - type: web
    name: instabrief-ai-service
    env: docker
    rootDir: ai-service
    plan: starter
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false # User will provide Neon JDBC URL
      - key: SPRING_DATASOURCE_USERNAME
        sync: false # User will provide Neon Username
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false # User will provide Neon Password
      - key: NEWS_API_KEY
        sync: false
      - key: HF_API_TOKEN
        sync: false
      - key: NLP_SERVICE_URL
        value: http://instabrief-nlp-service:3005

  # API Gateway
  - type: web
    name: instabrief-api-gateway
    env: node
    rootDir: api-gateway
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false # User will provide Neon Connection String
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://instabrief.onrender.com

  # Frontend
  - type: web
    name: instabrief-frontend
    env: static
    rootDir: frontend
    buildCommand: npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: instabrief-api-gateway
          property: host
